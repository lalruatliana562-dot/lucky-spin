 <!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Adsgram Script -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        .withdraw-btn { background: #28a745; margin-top: 20px; }
        .copy-btn { width: auto; margin: 0; background: #ffc107; color: #000; padding: 10px 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #333; color: #fff; font-size: 14px; }
    </style>
</head>
<body>

    <h3>Reward App</h3>
    
    <div class="card">
        <h2>Points: <span id="points">0</span></h2>
    </div>

    <div class="card">
        <p>Watch Ad & Earn 50 Points</p>
        <button id="adBtn" onclick="earnPoints(50, false)">Watch Ad</button>
    </div>

    <div class="card">
        <p>Daily Bonus (100 Points)</p>
        <button id="bonusBtn" onclick="earnPoints(100, true)">Claim Bonus</button>
    </div>

    <div class="card">
        <p>Invite friends & Earn 200 Points!</p>
        <div style="display: flex; gap: 8px; align-items: center; margin-top: 10px;">
            <input type="text" id="refLink" readonly>
            <button class="copy-btn" onclick="copyLink()">Copy</button>
        </div>
    </div>

    <button class="withdraw-btn" onclick="withdraw()">Withdraw ₹50 (5000 Pts)</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        document.getElementById('points').innerText = points;

        window.onload = function() {
            let userId = tg.initDataUnsafe.user?.id || "guest";
            let botUsername = "Spin_Lucky_2026_bot";

            document.getElementById('refLink').value = "https://t.me/" + botUsername + "?startapp=" + userId;

            let startParam = tg.initDataUnsafe.start_param;
            let hasRewarded = localStorage.getItem('referred_by_' + startParam);

            if (startParam && startParam !== userId && !hasRewarded) {
                localStorage.setItem('referred_by_' + startParam, 'true');
                alert("I thianpa link atanga lo lut i ni e!");
            }

            checkDailyBonusStatus();
        };

        function checkDailyBonusStatus() {
            let lastBonusDate = localStorage.getItem('lastBonusDate');
            let today = new Date().toDateString();

            if (lastBonusDate === today) {
                let bonusBtn = document.getElementById('bonusBtn');
                bonusBtn.disabled = true;
                bonusBtn.innerText = "Claimed Today!";
            }
        }

        function earnPoints(amount, isDailyBonus) {
            let adBtn = document.getElementById('adBtn');
            let bonusBtn = document.getElementById('bonusBtn');
            
            if (isDailyBonus) {
                let lastBonusDate = localStorage.getItem('lastBonusDate');
                let today = new Date().toDateString();
                if (lastBonusDate === today) {
                    alert("Vawiin atan Daily Bonus i claim tawh! Naktukah lo kal leh rawh.");
                    return;
                }
            }

            let originalAdText = adBtn.innerText;
            let originalBonusText = bonusBtn.innerText;

            adBtn.disabled = true;
            bonusBtn.disabled = true;
            
            if (isDailyBonus) {
                bonusBtn.innerText = "Loading Ad...";
            } else {
                adBtn.innerText = "Loading Ad...";
            }
            
            // Kan Live Block ID thar '36299' kan hmang ta e
            const AdController = window.Adsgram.init({ blockId: "36299" });
            
            AdController.show().then((result) => {
                points += amount;
                localStorage.setItem('userPoints', points);
                document.getElementById('points').innerText = points;
                
                if (isDailyBonus) {
                    let today = new Date().toDateString();
                    localStorage.setItem('lastBonusDate', today);
                    alert("Daily Bonus i en zawh avangin 100 Points i hmu e!");
                } else {
                    alert("Ad i en zawh avangin 50 Points i hmu e!");
                }
                
                resetButtons();
            }).catch((result) => {
                alert("Ad en zawh a nih loh avangin point hmuh tur a awm lo.");
                resetButtons();
            });

            function resetButtons() {
                adBtn.disabled = false;
                adBtn.innerText = originalAdText;
                
                checkDailyBonusStatus();
                if (localStorage.getItem('lastBonusDate') !== new Date().toDateString()) {
                    bonusBtn.disabled = false;
                    bonusBtn.innerText = originalBonusText;
                }
            }
        }

        function copyLink() {
            let copyText = document.getElementById("refLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Referral link copy a ni ta! I thiante va thawn rawh le.");
        }

        function withdraw() {
            if (points >= 5000) {
                let upi = prompt("Enter your UPI ID:");
                if (upi) tg.sendData("Withdraw: " + points + " pts, UPI: " + upi);
            } else {
                alert("Withdraw nan 5000 points a ngai!");
            }
        }
    </script>
</body>
</html>
