 <!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .withdraw-btn { background: #28a745; }
        .refer-btn { background: #ffc107; color: #000; }
    </style>
</head>
<body>
    <h3>Reward App</h3>
    <div class="card">
        <h2>Points: <span id="points">0</span></h2>
    </div>
    
    <div class="card">
        <p>Watch Ad & Earn 50 Points</p>
        <button onclick="earnPoints(50)">Watch Ad</button>
    </div>

    <div class="card">
        <p>Daily Bonus (100 Points)</p>
        <button onclick="earnPoints(100)">Claim Bonus</button>
    </div>

    <div class="card">
        <p>Invite friends & Earn 200 Points!</p>
        <button class="refer-btn" onclick="refer()">Share Referral Link</button>
    </div>

    <button class="withdraw-btn" onclick="withdraw()">Withdraw ₹50 (5000 Pts)</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        document.getElementById('points').innerText = points;

        function earnPoints(amount) {
            alert("Ads loading..."); 
            points += amount;
            localStorage.setItem('userPoints', points);
            document.getElementById('points').innerText = points;
        }

        function refer() {
            let userId = tg.initDataUnsafe.user?.id || "guest";
            let referralLink = "https://t.me/YourBotUsername?start=ref" + userId;
            if (navigator.share) {
                navigator.share({ title: 'Join & Earn!', text: 'He app hi download rawh:', url: referralLink });
            } else {
                prompt("I referral link chu hei hi a ni:", referralLink);
            }
        }

        function withdraw() {
            if (points >= 5000) {
                let upi = prompt("Enter your UPI ID:");
                if (upi) tg.sendData("Withdraw: " + points + " pts, UPI: " + upi);
            } else {
                alert("Withdraw nan 5000 points a ngai!");
            }
        }
    </script>
</body>
</html>
