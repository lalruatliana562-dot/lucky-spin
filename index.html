 <!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #222; color: white; }
        canvas { border: 5px solid #fff; border-radius: 50%; margin: 20px auto; display: block; }
        button { padding: 15px 30px; font-size: 16px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Lucky Spin</h3>
    <p>Total Coins: <span id="coinCount">0</span></p>
    <canvas id="wheel" width="300" height="300"></canvas>
    <button onclick="spin()">Spin Now</button>
    <button onclick="withdraw()">Withdraw</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let coins = parseInt(localStorage.getItem('userCoins')) || 0;
        document.getElementById('coinCount').innerText = coins;

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        // Price pool ti tlem tawh (1, 5, 10, 20, 50 coins)
        const sectors = [
            { color: '#FF5733', label: '1' }, { color: '#33FF57', label: '5' },
            { color: '#3357FF', label: '10' }, { color: '#F333FF', label: '0' },
            { color: '#FF33A8', label: '50' }, { color: '#33FFF6', label: '20' }
        ];

        function drawWheel() {
            let arc = Math.PI * 2 / sectors.length;
            sectors.forEach((s, i) => {
                ctx.beginPath();
                ctx.fillStyle = s.color;
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 140, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.save();
                ctx.fillStyle = "#fff";
                ctx.translate(150 + Math.cos(i * arc + arc/2) * 80, 150 + Math.sin(i * arc + arc/2) * 80);
                ctx.rotate(i * arc + arc/2 + Math.PI/2);
                ctx.fillText(s.label + " Coins", -20, 0);
                ctx.restore();
            });
        }
        drawWheel();

        function spin() {
            // Chance: 0 (Lose) a chhuah tam nan random percentage kan ti sang
            let rand = Math.random();
            let index;
            if (rand < 0.5) index = 3; // 50% chance in '0' (Lose) a chhuak
            else index = Math.floor(Math.random() * 5); // A bakah chuan point tlem te te

            let angle = (index * 60) + 1440;
            canvas.style.transition = "3s ease-out";
            canvas.style.transform = `rotate(${angle}deg)`;
            
            setTimeout(() => {
                let win = parseInt(sectors[index].label);
                coins += win;
                localStorage.setItem('userCoins', coins);
                document.getElementById('coinCount').innerText = coins;
                alert("I hlawhchhuah chu: " + win + " coins!");
            }, 3000);
        }

        function withdraw() {
            let upi = prompt("I UPI ID min han pe rawh:");
            if (upi) {
                tg.sendData("Withdraw Request: " + coins + " coins, User: " + tg.initDataUnsafe.user.username + ", UPI: " + upi);
            }
        }
    </script>
</body>
</html>
