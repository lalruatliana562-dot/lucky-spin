 <!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #wheel-container { position: relative; width: 300px; margin: 30px auto; }
        #arrow { position: absolute; top: -10px; left: 140px; width: 20px; height: 25px; background: #FFD700; clip-path: polygon(50% 100%, 0% 0%, 100% 0%); z-index: 10; }
        canvas { border: 8px solid #fff; border-radius: 50%; display: block; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 10px; background: #FFD700; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Lucky Spin</h3>
    <p>Total Coins: <span id="coinCount">0</span></p>
    <div id="wheel-container">
        <div id="arrow"></div>
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>
    <button onclick="spin()">Spin Now</button>
    <button onclick="withdraw()">Withdraw</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let coins = parseInt(localStorage.getItem('userCoins')) || 0;
        document.getElementById('coinCount').innerText = coins;

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        // Sector order (Clockwise aṭangin):
        const sectors = [
            { color: '#FF5733', label: '50' }, { color: '#FF33A8', label: '10' },
            { color: '#F333FF', label: '20' }, { color: '#3357FF', label: '15' },
            { color: '#33FF57', label: '5' }, { color: '#33FFF6', label: '5' }
        ];

        function drawWheel() {
            let arc = Math.PI * 2 / sectors.length;
            sectors.forEach((s, i) => {
                ctx.beginPath();
                ctx.fillStyle = s.color;
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 140, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.save();
                ctx.fillStyle = "#000";
                ctx.font = "bold 20px Arial";
                ctx.translate(150 + Math.cos(i * arc + arc/2) * 90, 150 + Math.sin(i * arc + arc/2) * 90);
                ctx.rotate(i * arc + arc/2 + Math.PI/2);
                ctx.fillText(s.label, -10, 0);
                ctx.restore();
            });
        }
        drawWheel();

        function spin() {
            let rand = Math.random();
            let index;
            // Probability distribution milin index kan thlan tir
            if (rand < 0.50) index = 4;      // 50% chance: 5
            else if (rand < 0.80) index = 1; // 30% chance: 10
            else if (rand < 0.95) index = 3; // 15% chance: 15
            else if (rand < 0.99) index = 2; // 4% chance: 20
            else index = 0;                  // 1% chance: 50

            // Math: Sector khat hi 60 degree a ni. 
            // 0 index kha top-a awm turin angle kan siam.
            let angle = index * 60; 
            let rotation = 1440 + angle; 
            
            canvas.style.transition = "3s cubic-bezier(0.2, 0.8, 0.3, 1)";
            canvas.style.transform = `rotate(-${rotation}deg)`; 
            
            setTimeout(() => {
                let win = parseInt(sectors[index].label);
                coins += win;
                localStorage.setItem('userCoins', coins);
                document.getElementById('coinCount').innerText = coins;
                alert("I hlawhchhuah chu: " + win + " coins!");
            }, 3000);
        }

        function withdraw() {
            let upi = prompt("I UPI ID min han pe rawh:");
            if (upi) {
                tg.sendData("Withdraw: " + coins + " coins, User: " + (tg.initDataUnsafe.user?.username || "Guest") + ", UPI: " + upi);
            }
        }
    </script>
</body>
</html>
