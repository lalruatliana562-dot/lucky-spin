 <!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        #wheel { width: 200px; height: 200px; border-radius: 50%; border: 5px solid #333; margin: 20px auto; transition: 3s; background: conic-gradient(red 0deg 90deg, yellow 90deg 180deg, green 180deg 270deg, blue 270deg 360deg); }
    </style>
</head>
<body>
    <h3>Lucky Spin</h3>
    <p>Coins: <span id="coinCount">0</span></p>
    <div id="wheel"></div>
    <button onclick="spin()">Spin Now</button>
    <button onclick="withdraw()">Withdraw</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let coins = parseInt(localStorage.getItem('userCoins')) || 0;
        document.getElementById('coinCount').innerText = coins;

        function spin() {
            let wheel = document.getElementById('wheel');
            let deg = Math.floor(Math.random() * 3600) + 720;
            wheel.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                coins += 10;
                localStorage.setItem('userCoins', coins);
                document.getElementById('coinCount').innerText = coins;
            }, 3000);
        }

        function withdraw() {
            if (coins >= 100) {
                // Telegram chat-ah message thawn tur
                tg.sendData("Withdraw Request: " + coins + " coins, User: " + tg.initDataUnsafe.user.username);
            } else {
                alert("Withdraw nan 100 coins a ngai!");
            }
        }
    </script>
</body>
</html>
